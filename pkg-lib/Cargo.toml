[package]
name = "pkg-lib"
description = "redox package manager library"

version.workspace = true
edition.workspace = true
license.workspace = true
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "pkg"

[dependencies]
serde = "1"
serde_derive = "1"
toml = "0.7"

#sha3 = "0.10"

libflate = "1.4"
tar = "0.4"

pkgar = "0.1"
pkgar-keys = "0.1"
pkgar-core = "0.1"

thiserror = "1"
sodiumoxide = "*"

#ring = "=0.17.0-not-released-yet"
#tuf = "0.2.0" # why not?

#hyper = { version = "0.14", default-features = false, features = ["client"] }
#hyper-rustls = "0.24"
#rustls = "0.21"
#rustls-pemfile = "1.0"

reqwest = { version = "0.11", default-features = false, features = ["rustls-tls-native-roots", "rustls-tls"] }

tokio = { version = "=1.23.0", features = ["macros", "rt-multi-thread"] }



[workspace]
resolver = "2"
members = [
    "pkg-lib",
    "pkg-cli",
    "pkg-gui",
]
default-members = [
    "pkg-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

